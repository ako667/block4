specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: PredictionMarketFactory
    network: base-sepolia
    source:
      address: "0x7e392657611208e4a80b7fba4f867661049770c3"
      abi: PredictionMarketFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - ProtocolStats
      abis:
        - name: PredictionMarketFactory
          file: PredictionMarketFactory/PredictionMarketFactory.json
        - name: PredictionMarket
          file: PredictionMarketFactory/PredictionMarket.json
      eventHandlers:
        - event: MarketCreated(indexed uint256,indexed address,bytes32,string,string)
          handler: handleMarketCreated
      file: PredictionMarketFactory/PredictionMarketFactory.wasm
templates:
  - kind: ethereum/contract
    name: PredictionMarket
    network: base-sepolia
    source:
      abi: PredictionMarket
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Trade
        - LiquidityPosition
        - Resolution
      abis:
        - name: PredictionMarket
          file: PredictionMarket/PredictionMarket.json
      eventHandlers:
        - event: OutcomeBought(indexed address,uint8,uint256,uint256)
          handler: handleOutcomeBought
        - event: OutcomeSold(indexed address,uint8,uint256,uint256)
          handler: handleOutcomeSold
        - event: LiquidityAdded(indexed address,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256)
          handler: handleLiquidityRemoved
        - event: MarketResolved(uint8)
          handler: handleMarketResolved
      file: PredictionMarketFactory/PredictionMarketFactory.wasm
